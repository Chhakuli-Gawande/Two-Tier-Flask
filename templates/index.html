<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome to CG Group 🌍</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(to right,#eef2ff,#f8fafc);
color:#333;
}

/* HERO */
.hero{
height:70vh;
background:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#fff;
position:relative;
padding:20px;
}

.hero::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.hero-content{
position:relative;
z-index:2;
max-width:700px;
}

.hero h1{
font-size:clamp(2rem,5vw,3.5rem);
}

.hero p{
margin-top:10px;
font-size:clamp(1rem,2vw,1.3rem);
}

/* CONTAINER */
.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* CARD STYLE */
.section{
background:#fff;
padding:20px;
border-radius:16px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
margin-bottom:30px;
}

.section h2{
text-align:center;
color:#2563eb;
margin-bottom:15px;
}

/* GRID */
.card-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
border-radius:12px;
overflow:hidden;
background:#fff;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card h3{
padding:12px;
text-align:center;
}

/* FORM */
form{
display:flex;
flex-direction:column;
gap:10px;
}

input[type="text"]{
padding:12px;
border-radius:8px;
border:1px solid #ccc;
}

input[type="submit"]{
padding:12px;
border:none;
border-radius:8px;
background:#2563eb;
color:#fff;
cursor:pointer;
font-size:16px;
}

input[type="submit"]:hover{
background:#1e40af;
}

/* FOOTER */
.footer{
text-align:center;
padding:15px;
font-size:14px;
color:#666;
}

/* RESPONSIVE */
@media(max-width:768px){
.hero{
height:60vh;
}
}

@media(max-width:480px){
.hero{
height:55vh;
}
}

</style>
</head>

<body>

<div class="hero">
<div class="hero-content">
<h1>Welcome to CG Group 🌍</h1>
<p>Explore. Share. Experience.</p>
</div>
</div>

<div class="container">

<div class="section">
<h2>About Our Community</h2>
<p style="text-align:center;">
CG Group is a modern travel community where users explore destinations and share experiences.
</p>
</div>

<div class="section">
<h2>Popular Destinations</h2>
<div class="card-grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<h3>Beach</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
<h3>Mountains</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e">
<h3>Forest</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d">
<h3>City</h3>
</div>

</div>
</div>

<div class="section">
<h2>Share Your Experience</h2>
<form id="messageForm">
<input type="text" name="new_message" placeholder="Write your travel story..." required>
<input type="submit" value="Submit">
</form>
</div>

<div class="footer">
Built by <strong>CG Group</strong>
</div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function(){
$("#messageForm").on("submit",function(event){
event.preventDefault();
let messageInput=$("input[name='new_message']");
let message=messageInput.val().trim();

if(message===""){
alert("Message cannot be empty!");
return;
}

$.ajax({
url:"/submit",
type:"POST",
data:{new_message:message},

success:function(){
messageInput.val("");
alert("Message submitted successfully!");
},
error:function(){
alert("Failed to submit message.");
}
});
});
});
</script>

</body>
</html>
